<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Squircle background — paper (#FAF9F6) with subtle border -->
  <rect width="512" height="512" rx="115" ry="115" fill="#FAF9F6"/>
  <rect width="512" height="512" rx="115" ry="115" fill="none" stroke="#D8D6D0" stroke-width="3"/>

  <!-- BIFL in ink black + 365 in orange, matching header wordmark -->
  <text
    x="256"
    y="300"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="108"
    font-weight="900"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2"
