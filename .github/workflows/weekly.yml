name: Weekly BIFL Pipeline

on:
  schedule:
    # Run every 6 hours (bypassing daily Gemini API quota limits with smaller batches)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      PIPELINE_RESEARCH_PROVIDER:
        description: 'Research provider (gemini | claude | ollama)'
        required: false
        default: 'gemini'
      PIPELINE_SCORING_PROVIDER:
        description: 'Scoring provider (gemini | claude | ollama | none)'
        required: false
        default: 'gemini'
      PIPELINE_CONTENT_PROVIDER:
        description: 'Content provider (gemini | claude | ollama | none)'
        required: false
        default: 'gemini'
      PIPELINE_CATEGORY_FILTER:
        description: 'Comma-separated category subset (leave empty for all)'
        required: false
        default: ''

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NODE_ENV: production
          PIPELINE_RESEARCH_SOURCE: online
          PIPELINE_RESEARCH_PROVIDER: ${{ inputs.PIPELINE_RESEARCH_PROVIDER || 'gemini' }}
          PIPELINE_SCORING_PROVIDER: ${{ inputs.PIPELINE_SCORING_PROVIDER || 'gemini' }}
          PIPELINE_CONTENT_PROVIDER: ${{ inputs.PIPELINE_CONTENT_PROVIDER || 'gemini' }}
          PIPELINE_CATEGORY_FILTER: ${{ inputs.PIPELINE_CATEGORY_FILTER || '' }}
        run: node pipeline.mjs

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-content-${{ github.run_id }}
          path: output/
          retention-days: 90
