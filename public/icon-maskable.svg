<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full rectangle background for maskable (system crops to circle/squircle) -->
  <rect width="512" height="512" fill="#FAF9F6"/>

  <!-- Content stays within centre 80% safe zone (approx 56px inset each side) -->
  <!-- BIFL in ink black + 365 in orange, matching header wordmark -->
  <text
    x="256"
    y="300"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="108"
    font-weight="900"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2"
  >
    <tspan fill="#121212">BIFL</tspan><tspan fill="#FF5733">365</tspan>
  </text>
</svg>
